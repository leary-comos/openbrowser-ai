name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty to use pyproject.toml version)'
        required: false
        type: string

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        run: python -m build

      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/openbrowser-ai
    permissions:
      id-token: write

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/openbrowser-ai
    permissions:
      id-token: write

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-to-mcp-registry:
    name: Publish to MCP Registry
    needs: publish-to-pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -sSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher --help

      - name: Update server.json version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python3 -c "
          import json
          with open('server.json') as f:
              data = json.load(f)
          data['version'] = '${VERSION}'
          for pkg in data.get('packages', []):
              pkg['version'] = '${VERSION}'
          with open('server.json', 'w') as f:
              json.dump(data, f, indent=2)
          "
          cat server.json

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login dns --domain=openbrowser.me --private-key=${{ secrets.MCP_DNS_PRIVATE_KEY }}

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

  update-homebrew-formula:
    name: Update Homebrew Formula
    needs: publish-to-pypi
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Wait for PyPI availability
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Waiting for openbrowser-ai $VERSION on PyPI..."
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/openbrowser-ai/$VERSION/json" > /dev/null 2>&1; then
              echo "Package available on PyPI (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/30 -- not available yet, waiting 10s..."
            sleep 10
          done
          echo "ERROR: Package not available on PyPI after 5 minutes"
          exit 1

      - name: Fetch PyPI metadata and update formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python3 << PYEOF
          import json, subprocess, sys, base64, urllib.request

          version = "${VERSION}"

          # Fetch sdist metadata from PyPI
          with urllib.request.urlopen(f"https://pypi.org/pypi/openbrowser-ai/{version}/json") as resp:
              data = json.load(resp)

          sdist_url = None
          sdist_sha = None
          for url_info in data["urls"]:
              if url_info["packagetype"] == "sdist":
                  sdist_url = url_info["url"]
                  sdist_sha = url_info["digests"]["sha256"]
                  break

          if not sdist_url or not sdist_sha:
              print("ERROR: Could not find sdist in PyPI response")
              sys.exit(1)

          print(f"Version: {version}")
          print(f"URL: {sdist_url}")
          print(f"SHA: {sdist_sha}")

          # Generate formula using template substitution (avoids f-string escaping issues with Ruby #{} syntax)
          FORMULA_TEMPLATE = '''\
          class OpenbrowserAi < Formula
            desc "AI-powered browser automation using CodeAgent and CDP"
            homepage "https://docs.openbrowser.me"
            url "URL_PLACEHOLDER"
            sha256 "SHA_PLACEHOLDER"
            license "MIT"

            depends_on "python@3.12"

            def install
              python3 = Formula["python@3.12"].opt_bin/"python3.12"
              venv = Utils.safe_popen_read(python3, "-c", "import venv; print('ok')").strip
              if venv != "ok"
                odie "Python venv module not available"
              end

              # Create virtualenv
              system python3, "-m", "venv", libexec
              # Install from PyPI (includes all dependencies)
              system libexec/"bin/pip", "install", "--no-cache-dir", "openbrowser-ai==#{version}"
              # Symlink the CLI entry point
              bin.install_symlink Dir[libexec/"bin/openbrowser*"]
            end

            def post_install
              # Install Chromium for browser automation
              system bin/"openbrowser-ai", "install"
            rescue StandardError
              opoo "Chromium install skipped. Run 'openbrowser-ai install' manually."
            end

            test do
              assert_match "usage", shell_output("#{bin}/openbrowser-ai --help 2>&1", 0).downcase
            end
          end
          '''
          import textwrap
          formula = textwrap.dedent(FORMULA_TEMPLATE)
          formula = formula.replace("URL_PLACEHOLDER", sdist_url)
          formula = formula.replace("SHA_PLACEHOLDER", sdist_sha)

          content_b64 = base64.b64encode(formula.encode()).decode()

          # Get current file SHA from homebrew repo
          import os
          token = os.environ["GH_TOKEN"]
          req = urllib.request.Request(
              "https://api.github.com/repos/billy-enrizky/homebrew-openbrowser/contents/Formula/openbrowser-ai.rb",
              headers={"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"},
          )
          with urllib.request.urlopen(req) as resp:
              current_sha = json.load(resp)["sha"]

          # Update via GitHub Contents API
          update_data = json.dumps({
              "message": f"chore: bump openbrowser-ai to {version}",
              "content": content_b64,
              "sha": current_sha,
          }).encode()

          req = urllib.request.Request(
              "https://api.github.com/repos/billy-enrizky/homebrew-openbrowser/contents/Formula/openbrowser-ai.rb",
              data=update_data,
              method="PUT",
              headers={
                  "Authorization": f"token {token}",
                  "Accept": "application/vnd.github.v3+json",
                  "Content-Type": "application/json",
              },
          )
          with urllib.request.urlopen(req) as resp:
              result = json.load(resp)
              print(f"Formula updated: {result['content']['html_url']}")
          PYEOF

  upload-install-script:
    name: Upload Installer Scripts
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Upload install scripts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" install.sh install.ps1 --clobber

  sync-plugin-version:
    name: Sync Claude Code Plugin Version
    needs: publish-to-pypi
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update plugin and marketplace versions to match release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python3 << PYEOF
          import json, sys

          version = "${VERSION}"
          changed = []

          # Update plugin manifest
          plugin_path = "plugin/.claude-plugin/plugin.json"
          with open(plugin_path) as f:
              plugin = json.load(f)
          if plugin.get("version") != version:
              plugin["version"] = version
              with open(plugin_path, "w") as f:
                  json.dump(plugin, f, indent=2)
                  f.write("\n")
              changed.append(plugin_path)
              print(f"Updated {plugin_path} to {version}")

          # Update marketplace plugin entry
          market_path = ".claude-plugin/marketplace.json"
          with open(market_path) as f:
              market = json.load(f)
          for entry in market.get("plugins", []):
              if entry.get("name") == "openbrowser" and entry.get("version") != version:
                  entry["version"] = version
                  with open(market_path, "w") as f:
                      json.dump(market, f, indent=2)
                      f.write("\n")
                  changed.append(market_path)
                  print(f"Updated {market_path} to {version}")
                  break

          # Update MCP registry server.json
          server_path = "server.json"
          with open(server_path) as f:
              server = json.load(f)
          needs_update = False
          if server.get("version") != version:
              server["version"] = version
              needs_update = True
          for pkg in server.get("packages", []):
              if pkg.get("version") != version:
                  pkg["version"] = version
                  needs_update = True
          if needs_update:
              with open(server_path, "w") as f:
                  json.dump(server, f, indent=2)
                  f.write("\n")
              changed.append(server_path)
              print(f"Updated {server_path} to {version}")

          if not changed:
              print(f"All files already at {version}, no update needed")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugin/.claude-plugin/plugin.json .claude-plugin/marketplace.json server.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore(plugin): sync version to ${GITHUB_REF_NAME#v}" && \
            git push origin main
